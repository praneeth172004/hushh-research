name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Deploy backend only, frontend only, or both"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend
          - frontend
      run_predeploy_backup_job:
        description: "Optionally run logical backup job before backend deploy gate"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  GCP_PROJECT_ID: hushh-pda
  GCP_REGION: us-central1
  BACKEND_SERVICE: consent-protocol
  FRONTEND_SERVICE: hushh-webapp
  CLOUD_RUN_REVISION_RETENTION: "10"
  BACKUP_BUCKET: hushh-pda-prod-db-backups
  BACKUP_PREFIX: prod/supabase-logical
  BACKUP_MAX_AGE_HOURS: "30"
  BACKUP_JOB_NAME: prod-supabase-logical-backup

jobs:
  deploy:
    name: Deploy Production Scope
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set GCP project context
        run: gcloud config set project "${{ env.GCP_PROJECT_ID }}"

      - name: Resolve deployment scope
        id: scope
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            SCOPE="${{ github.event.inputs.scope }}"
          else
            SCOPE="all"
          fi

          case "$SCOPE" in
            backend)
              DEPLOY_BACKEND=true
              DEPLOY_FRONTEND=false
              ;;
            frontend)
              DEPLOY_BACKEND=false
              DEPLOY_FRONTEND=true
              ;;
            *)
              SCOPE="all"
              DEPLOY_BACKEND=true
              DEPLOY_FRONTEND=true
              ;;
          esac

          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "deploy_backend=$DEPLOY_BACKEND" >> "$GITHUB_OUTPUT"
          echo "deploy_frontend=$DEPLOY_FRONTEND" >> "$GITHUB_OUTPUT"

      - name: Set up Python for DB governance gates
        if: steps.scope.outputs.deploy_backend == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install DB governance dependencies
        if: steps.scope.outputs.deploy_backend == 'true'
        run: python3 -m pip install --disable-pip-version-check asyncpg google-cloud-storage

      - name: Optional predeploy logical backup run
        if: steps.scope.outputs.deploy_backend == 'true' && github.event.inputs.run_predeploy_backup_job == 'true'
        run: |
          set -euo pipefail
          gcloud run jobs execute "${BACKUP_JOB_NAME}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --wait

      - name: Pre-deploy logical backup freshness gate
        if: steps.scope.outputs.deploy_backend == 'true'
        id: backup-gate
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ops/logical_backup_freshness_check.py \
            --project-id "${GCP_PROJECT_ID}" \
            --bucket "${BACKUP_BUCKET}" \
            --prefix "${BACKUP_PREFIX}" \
            --max-age-hours "${BACKUP_MAX_AGE_HOURS}" \
            --report-path /tmp/backup-posture-report.json

          BACKUP_OBJECT_URI="$(python3 -c "import json; from pathlib import Path; payload=json.loads(Path('/tmp/backup-posture-report.json').read_text(encoding='utf-8')); latest=payload.get('latest_backup', {}) if isinstance(payload, dict) else {}; print(str(latest.get('backup_object_uri') or '').strip())")"
          BACKUP_COMPLETED_AT="$(python3 -c "import json; from pathlib import Path; payload=json.loads(Path('/tmp/backup-posture-report.json').read_text(encoding='utf-8')); latest=payload.get('latest_backup', {}) if isinstance(payload, dict) else {}; print(str(latest.get('backup_completed_at') or '').strip())")"
          echo "backup_object_uri=${BACKUP_OBJECT_URI}" >> "$GITHUB_OUTPUT"
          echo "backup_completed_at=${BACKUP_COMPLETED_AT}" >> "$GITHUB_OUTPUT"

      - name: Migration governance and DB drift gate
        if: steps.scope.outputs.deploy_backend == 'true'
        shell: bash
        run: |
          set -euo pipefail

          SERVICE_JSON="$(gcloud run services describe "${{ env.BACKEND_SERVICE }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --region="${{ env.GCP_REGION }}" \
            --format=json)"

          DB_HOST="$(printf '%s' "${SERVICE_JSON}" | jq -r '.spec.template.spec.containers[0].env[] | select(.name=="DB_HOST") | .value' | tail -n 1)"
          DB_PORT="$(printf '%s' "${SERVICE_JSON}" | jq -r '.spec.template.spec.containers[0].env[] | select(.name=="DB_PORT") | .value' | tail -n 1)"
          DB_NAME="$(printf '%s' "${SERVICE_JSON}" | jq -r '.spec.template.spec.containers[0].env[] | select(.name=="DB_NAME") | .value' | tail -n 1)"

          DB_USER="$(gcloud secrets versions access latest --secret=DB_USER --project="${{ env.GCP_PROJECT_ID }}")"
          DB_PASSWORD="$(gcloud secrets versions access latest --secret=DB_PASSWORD --project="${{ env.GCP_PROJECT_ID }}")"
          echo "::add-mask::${DB_USER}"
          echo "::add-mask::${DB_PASSWORD}"

          if [ -z "${DB_HOST}" ] || [ -z "${DB_USER}" ] || [ -z "${DB_PASSWORD}" ]; then
            echo "Failed to resolve DB credentials/host for migration governance gate."
            exit 1
          fi

          export DB_HOST DB_USER DB_PASSWORD
          export DB_PORT="${DB_PORT:-5432}"
          export DB_NAME="${DB_NAME:-postgres}"
          python3 scripts/ops/db_migration_release_guard.py \
            --report-path /tmp/db-migration-guard-report.json

      - name: Generate production migration release manifest
        if: steps.scope.outputs.deploy_backend == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ops/generate_migration_release_manifest.py \
            --output /tmp/prod-migration-release-manifest.json \
            --environment production \
            --backup-report-path /tmp/backup-posture-report.json

      - name: Upload production DB governance artifacts
        if: always() && steps.scope.outputs.deploy_backend == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: prod-db-governance-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            /tmp/backup-posture-report.json
            /tmp/db-migration-guard-report.json
            /tmp/prod-migration-release-manifest.json

      - name: Deploy backend using Cloud Build
        if: steps.scope.outputs.deploy_backend == 'true'
        run: |
          gcloud builds submit \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --config=deploy/backend.cloudbuild.yaml \
            --substitutions=_BACKEND_SERVICE=${{ env.BACKEND_SERVICE }},_REGION=${{ env.GCP_REGION }},_ENVIRONMENT=production

      - name: Get backend URL
        if: steps.scope.outputs.deploy_backend == 'true'
        id: backend-url
        run: |
          BACKEND_URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "Backend URL: $BACKEND_URL"

      - name: Retain latest backend revisions
        if: steps.scope.outputs.deploy_backend == 'true'
        continue-on-error: true
        run: bash scripts/ci/cloudrun-retention.sh "${{ env.BACKEND_SERVICE }}" "${{ env.GCP_REGION }}" "${{ env.CLOUD_RUN_REVISION_RETENTION }}"

      - name: Deploy frontend using Cloud Build
        if: steps.scope.outputs.deploy_frontend == 'true'
        run: |
          gcloud builds submit \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --config=deploy/frontend.cloudbuild.yaml \
            --substitutions=_FRONTEND_SERVICE=${{ env.FRONTEND_SERVICE }},_REGION=${{ env.GCP_REGION }},_APP_ENV=production

      - name: Get frontend URL
        if: steps.scope.outputs.deploy_frontend == 'true'
        id: frontend-url
        run: |
          FRONTEND_URL=$(gcloud run services describe ${{ env.FRONTEND_SERVICE }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "Frontend URL: $FRONTEND_URL"

      - name: Retain latest frontend revisions
        if: steps.scope.outputs.deploy_frontend == 'true'
        continue-on-error: true
        run: bash scripts/ci/cloudrun-retention.sh "${{ env.FRONTEND_SERVICE }}" "${{ env.GCP_REGION }}" "${{ env.CLOUD_RUN_REVISION_RETENTION }}"

      - name: Deployment Summary
        if: always()
        shell: bash
        run: |
          echo "✅ Production Deployment Complete"
          echo "Scope: ${{ steps.scope.outputs.scope }}"
          if [ "${{ steps.scope.outputs.deploy_backend }}" = "true" ]; then
            echo "Backend: ${{ steps.backend-url.outputs.url }}"
            echo "Latest backup object: ${{ steps.backup-gate.outputs.backup_object_uri }}"
            echo "Latest backup completed at: ${{ steps.backup-gate.outputs.backup_completed_at }}"
          else
            echo "Backend: skipped"
          fi
          if [ "${{ steps.scope.outputs.deploy_frontend }}" = "true" ]; then
            echo "Frontend: ${{ steps.frontend-url.outputs.url }}"
          else
            echo "Frontend: skipped"
          fi
